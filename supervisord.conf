[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10

[program:ttyd]
command=/usr/local/bin/ttyd -p 7681 -b /terminal -W bash -l
autostart=true
autorestart=true
priority=20

[program:dropbear]
command=/usr/sbin/dropbear -F -E -p 22 -R -B
autostart=true
autorestart=true
priority=30

[program:playit]
command=/usr/bin/playit --secret 45c45b1a5c667718afca780abc8807ab8e31cdeb08cd972c205853f0293249ac
autostart=true
autorestart=true
priority=40
stdout_logfile=/var/log/playit.log
stderr_logfile=/var/log/playit.log

[program:sftp-updater]
command=/usr/local/bin/update-sftp.sh
autostart=true
autorestart=true
priority=50

[program:keep-alive]
command=/usr/local/bin/keep-alive.sh
autostart=true
autorestart=true
priority=60

[program:auto-cleanup]
command=/usr/local/bin/auto-cleanup.sh
autostart=true
autorestart=true
priority=70
