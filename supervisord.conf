[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10

[program:ttyd]
command=/usr/local/bin/ttyd -p 7681 -b /terminal -W bash -l
autostart=true
autorestart=true
priority=20

[program:dropbear]
command=/usr/sbin/dropbear -F -E -p 22 -R -B
autostart=true
autorestart=true
priority=30
startsecs=2
startretries=10

[program:cloudflared]
command=/bin/bash -c "/usr/local/bin/cloudflared tunnel --no-autoupdate run --token $CLOUDFLARE_TOKEN"
autostart=true
autorestart=true
stdout_logfile=/var/log/cloudflared.log
stderr_logfile=/var/log/cloudflared.log
priority=40
startsecs=5
startretries=999

[program:keep-alive]
command=/usr/local/bin/keep-alive.sh
autostart=true
autorestart=true
stdout_logfile=/var/log/keepalive.log
stderr_logfile=/var/log/keepalive.log
priority=50

[program:auto-cleanup]
command=/usr/local/bin/auto-cleanup.sh
autostart=true
autorestart=true
stdout_logfile=/var/log/cleanup.log
stderr_logfile=/var/log/cleanup.log
priority=60
